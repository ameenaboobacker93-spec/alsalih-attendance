<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/hospital-sign.png">
    <link rel="shortcut icon" href="https://img.icons8.com/fluency/240/hospital-sign.png">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 0; }
        .c-acc { color: #06b6d4; } .c-off { color: #ef4444; }
        header { padding: 30px 20px; text-align: center; background: radial-gradient(circle at top, #083344, transparent); }
        .brand { font-weight: 800; font-size: 1.8rem; color: #fff; text-transform: uppercase; }
        .tagline { color: #06b6d4; font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase; display: block; margin-top: 5px; font-weight: 700; }
        #clock { font-size: 2.2rem; font-weight: 300; display: inline-block; padding: 10px 40px; border-radius: 50px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); margin: 20px 0; }
        .container { width: 94%; max-width: 1000px; margin: 0 auto 50px auto; }
        .nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .nav-btn { padding: 12px 25px; border-radius: 30px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); font-weight: 600; font-size: 0.85rem; }
        .nav-btn.active { background: #fff; color: #000; }
        .card { background: rgba(15, 23, 42, 0.8); border-radius: 30px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-term { padding: 20px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; color: white; text-transform: uppercase; width: 100%; font-size: 0.9rem; transition: opacity 0.3s; }
        .btn-term:disabled { opacity: 0.5; cursor: not-allowed; }
        .log-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .log-table th { color: #06b6d4; font-size: 0.65rem; text-align: left; padding: 0 10px; text-transform: uppercase; font-weight: 800; }
        .log-table td { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; font-size: 0.9rem; }
        .status-pill { padding: 5px 10px; border-radius: 6px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; display: inline-block; }
        .st-ot { background: #1e3a8a; color: #fff; } .st-off { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .label-tag { font-size:0.7rem; color:#06b6d4; font-weight:800; display:block; margin-bottom:5px; text-transform:uppercase; }
        input, select { width: 100%; padding: 15px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; margin-bottom: 12px; font-size: 1rem; box-sizing: border-box; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index: 1000; }
        .modal-body { background: #0f172a; width: 85%; max-width: 350px; margin: 10vh auto; padding: 30px; border-radius: 25px; border: 1px solid #06b6d4; }
        #toast { visibility: hidden; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #10b981; color: #fff; padding: 12px 25px; border-radius: 10px; font-weight: 800; z-index: 9999; transition: opacity 0.3s; }
        #toast.error { background: #ef4444; }
        #toast.show { visibility: visible; opacity: 1; }
        .loader { width: 16px; height: 16px; border: 2px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; margin-right: 8px; vertical-align: middle; }
        .loader-lg { width: 24px; height: 24px; border: 3px solid #06b6d4; border-bottom-color: transparent; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.85); z-index: 9998; justify-content: center; align-items: center; flex-direction: column; gap: 15px; }
        .loading-overlay.show { display: flex; }
        .loading-overlay span { font-size: 0.8rem; color: #06b6d4; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
        .stat-card { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 18px; text-align: center; border: 1px solid rgba(255,255,255,0.06); }
        .stat-card .num { font-size: 2rem; font-weight: 800; color: #fff; }
        .stat-card .lbl { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: #06b6d4; font-weight: 700; margin-top: 4px; }
        .admin-section { margin-bottom: 28px; }
        .admin-section h5 { color: #06b6d4; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; margin: 0 0 12px 0; display: flex; align-items: center; gap: 8px; }
        .admin-section h5::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
        .settings-card { background: rgba(6, 182, 212, 0.05); border: 1px solid rgba(6, 182, 212, 0.15); border-radius: 16px; padding: 20px; }
        .settings-card h6 { margin: 0 0 12px 0; color: #06b6d4; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        .pwd-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; align-items: end; }
        .pwd-row input { margin: 0; }
        .action-btn-sm { padding: 8px 14px; border-radius: 8px; border: none; font-weight: 700; font-size: 0.65rem; cursor: pointer; color: white; text-transform: uppercase; letter-spacing: 1px; transition: opacity 0.2s; }
        .action-btn-sm:hover { opacity: 0.8; }
        .admin-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .admin-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .audit-log { max-height: 260px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 8px; font-size: 0.65rem; }
        .audit-log::-webkit-scrollbar { width: 4px; }
        .audit-log::-webkit-scrollbar-thumb { background: #06b6d4; border-radius: 4px; }
        .audit-entry { padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.04); display: grid; grid-template-columns: 60px 1fr; gap: 6px; }
        .audit-entry:last-child { border-bottom: none; }
        .audit-entry .a-time { color: #06b6d4; font-weight: 600; opacity: 0.7; }
        .audit-entry .a-action { color: #fff; font-weight: 600; }
        .audit-entry .a-detail { color: rgba(255,255,255,0.5); grid-column: 2; font-size: 0.6rem; }
        .btn-export { padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; font-weight: 600; font-size: 0.6rem; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; display: inline-flex; align-items: center; gap: 5px; }
        .btn-export:hover { background: rgba(255,255,255,0.1); border-color: #06b6d4; }
</head>
<body>
<!-- DIAGNOSTIC: If you can see this text, the HTML is loading -->
<div id="diag" style="color:lime; background:#000; padding:10px; font-family:sans-serif; font-size:14px; text-align:center; position:fixed; top:0; left:0; right:0; z-index:99999">✅ APP LOADED</div>

<header>
    <div class="brand">AL SALIH PHARMACY AJMAN</div>
    <span class="tagline">ATTENDANCE PORTAL</span>
    <div id="clock">00:00:00 AM</div>
    <div class="nav">
        <div class="nav-btn active" id="n1" onclick="tab('att')">Terminal</div>
        <div class="nav-btn" id="n2" onclick="tab('por')">Dashboard</div>
        <div class="nav-btn" id="n3" onclick="tab('adm')" style="display:none">⚙ Admin</div>
    </div>
</header>

<div id="toast">SUCCESS ✓</div>
<div class="loading-overlay" id="loading-overlay">
    <div class="loader loader-lg"></div>
    <span>Loading...</span>
</div>

<div class="container">
    <div id="v-att" class="card">
        <label class="label-tag">SELECT STAFF NAME</label>
        <select id="user-name"><option value="" disabled selected>--- Loading Staff ---</option></select>
        <label class="label-tag">SELECT SHIFT DATE</label>
        <input type="date" id="user-date">
        <div style="grid-template-columns:1fr 1fr; display:grid; gap:10px">
            <button class="btn-term" id="btn-start" style="background:#10b981" onclick="askPunch('START SHIFT')">Start Shift</button>
            <button class="btn-term" id="btn-end" style="background:#ef4444" onclick="askPunch('END SHIFT')">End Shift</button>
        </div>
    </div>

    <div id="v-por" style="display:none" class="card">
        <!-- STAFF VIEW SECTION -->
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px">
            <div><label class="label-tag">STAFF</label><select id="p-name" onchange="load()"><option value="" disabled selected>Loading...</option></select></div>
            <div><label class="label-tag">MONTH</label><input type="month" id="p-month" onchange="load()"></div>
        </div>
        <div style="display:flex; gap:8px; margin-bottom:15px; flex-wrap:wrap">
            <button class="btn-export" onclick="exportCSV()">📥 Export CSV</button>
            <button class="btn-export" onclick="exportFullCSV()">📥 Full History CSV</button>
        </div>
        <div id="p-stat" style="display:none; text-align:center; margin-bottom:20px; background:rgba(255,255,255,0.03); padding:15px; border-radius:20px">
            <small id="r-status-lbl" style="color:#06b6d4; font-weight:800; text-transform:uppercase">NET PAYABLE</small>
            <div id="r-ot" style="font-size:2rem; font-weight:800">--</div>
            <button onclick="openSum()" style="background:none; border:1px solid #06b6d4; color:#06b6d4; padding:5px 15px; border-radius:20px; font-size:0.6rem; cursor:pointer; margin-top:5px">VIEW SUMMARY</button>
        </div>
        <div style="overflow-x:auto"><table class="log-table">
            <thead><tr><th>DATE</th><th>SHIFT (HRS)</th><th style="text-align:center">OT</th><th style="text-align:right">STATUS</th></tr></thead>
            <tbody id="p-table-body"></tbody>
        </table></div>
        <button id="mgr-auth-btn" style="width:100%; padding:15px; border-radius:12px; background:none; border:1px solid #06b6d4; color:#06b6d4; font-weight:800; cursor:pointer; margin-top:15px" onclick="document.getElementById('m-pin-box').style.display='block'">🔐 ADMINISTRATOR ACCESS</button>
    </div>

    <div id="v-adm" style="display:none">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <div>
                    <div style="font-weight:800; font-size:1.1rem">⚙ ADMIN PANEL</div>
                    <div style="font-size:0.65rem; color:#06b6d4; letter-spacing:2px; text-transform:uppercase; margin-top:2px">Management Console</div>
                </div>
                <button onclick="logout()" class="action-btn-sm" style="background:#ef4444">LOGOUT</button>
            </div>

            <div class="admin-grid-2" style="margin-bottom:25px">
                <div class="stat-card"><div class="num" id="stat-staff">--</div><div class="lbl">Total Staff</div></div>
                <div class="stat-card"><div class="num" id="stat-duty">--</div><div class="lbl">On Duty Now</div></div>
            </div>

            <div class="admin-section">
                <h5>Staff Management</h5>
                <div style="display:flex; gap:8px; margin-bottom:12px">
                    <button class="action-btn-sm" style="background:#10b981" onclick="openRegModal()">+ Register</button>
                    <button class="action-btn-sm" style="background:#06b6d4" onclick="loadAdminData()">↻ Refresh</button>
                </div>
                <div id="staff-manage-table" style="background:rgba(255,255,255,0.02); padding:12px; border-radius:12px; font-size:0.75rem"></div>
            </div>

            <div class="admin-section">
                <h5>On-Duty Status</h5>
                <div id="on-duty-list" class="admin-grid-2"></div>
            </div>

            <div class="admin-section">
                <h5>Settlements</h5>
                <div style="background:rgba(255,255,255,0.02); padding:15px; border-radius:12px">
                    <div class="admin-grid-2">
                        <div><label class="label-tag">Target Month</label><input type="month" id="f-month" style="margin:0"></div>
                        <div><label class="label-tag">Staff</label><select id="f-staff" style="margin:0"><option value="" disabled selected>--- Select ---</option></select></div>
                    </div>
                    <div class="admin-grid-2" style="margin-top:8px">
                        <div><label class="label-tag">Net OT</label><input type="number" step="0.01" id="f-ot" placeholder="0.00" style="margin:0"></div>
                        <div><label class="label-tag">Status</label><select id="f-status" style="margin:0"><option>PENDING</option><option>CLEARED</option></select></div>
                    </div>
                    <button class="btn-term" style="background:#10b981; padding:12px; margin-top:12px" onclick="saveSettle()">LOCK & PUBLISH</button>
                </div>
            </div>

            <div class="admin-section">
                <h5>Export Reports</h5>
                <div style="display:flex; gap:8px; flex-wrap:wrap">
                    <button class="btn-export" onclick="exportAllCSV()">📥 All Staff CSV</button>
                </div>
                <small style="display:block; margin-top:6px; opacity:0.4; font-size:0.55rem">Exports attendance for all staff for the selected month</small>
            </div>

            <div class="admin-section">
                <h5>Settings</h5>
                <div class="settings-card">
                    <h6>Change Admin Password</h6>
                    <div class="pwd-row">
                        <div><label class="label-tag">Current</label><input type="password" id="pwd-current" placeholder="••••" style="margin:0; font-size:0.85rem"></div>
                        <div><label class="label-tag">New</label><input type="password" id="pwd-new" placeholder="••••" style="margin:0; font-size:0.85rem"></div>
                        <button class="btn-term" style="background:#06b6d4; padding:15px; font-size:0.65rem" onclick="changePassword()">UPDATE</button>
                    </div>
                </div>
            </div>

            <div class="admin-section">
                <h5>Audit Log</h5>
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px">
                    <small style="opacity:0.5; font-size:0.6rem">Track of all admin actions</small>
                    <button class="btn-export" onclick="refreshAuditLog()">↻ Refresh</button>
                </div>
                <div id="audit-log-list" class="audit-log">
                    <div style="opacity:0.5; font-size:0.65rem; padding:10px; text-align:center">Loading...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="m-reg" class="modal"><div class="modal-body" style="max-width:400px">
    <h3 id="reg-title" style="margin-top:0; color:#06b6d4">STAFF REGISTRATION</h3>
    <input type="hidden" id="edit-old-name">
    <label class="label-tag">STAFF NAME</label><input type="text" id="reg-name" placeholder="FULL NAME">
    <label class="label-tag">DUTY HOURS (FOR OT)</label><input type="number" id="reg-hrs" placeholder="9">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
        <div><label class="label-tag">SHIFT START</label><input type="time" id="reg-start" value="09:00"></div>
        <div><label class="label-tag">SHIFT END</label><input type="time" id="reg-end" value="18:00"></div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px">                <button onclick="closeRegModal()" class="btn-term" style="background:#334155">CANCEL</button>
        <button id="reg-btn" class="btn-term" style="background:#10b981" onclick="regStaff()">REGISTER</button>
    </div>
</div></div>

<div id="m-confirm" class="modal"><div class="modal-body" style="text-align:center">
    <h3 id="conf-title" style="color:#06b6d4; margin-top:0">CONFIRM ACTION</h3>
    <p id="conf-msg" style="font-size:0.9rem; opacity:0.8; margin-bottom:25px"></p>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
        <button onclick="closeConfirmModal()" class="btn-term" style="background:#334155; padding:12px">CANCEL</button>
        <button id="btn-final-confirm" class="btn-term" style="background:#10b981; padding:12px">YES, PROCEED</button>
    </div>
</div></div>

<div id="m-sum-view" class="modal"><div class="modal-body">
    <h3 style="margin-top:0; color:#06b6d4">Month Summary</h3>
    <div id="sum-content" style="line-height:2">
        <div style="display:grid; grid-template-columns:1fr 1fr"><span>Total OT:</span><b id="s-tot-ot" style="text-align:right"></b></div>
        <div style="display:grid; grid-template-columns:1fr 1fr"><span>Compensated:</span><b id="s-tot-comp" style="text-align:right; color:#ef4444"></b></div>
        <div style="display:grid; grid-template-columns:1fr 1fr"><span>Off Days:</span><b id="s-off" style="text-align:right"></b></div>
        <hr style="border:0; border-top:1px solid #333">
        <div style="display:grid; grid-template-columns:1fr 1fr"><span>Net Payable:</span><b id="s-net" style="text-align:right; color:#10b981; font-size:1.2rem"></b></div>
        <div style="display:grid; grid-template-columns:1fr 1fr"><span>Status:</span><b id="s-status" style="text-align:right"></b></div>
    </div>
    <button onclick="document.getElementById('m-sum-view').style.display='none'" class="btn-term" style="background:#334155; margin-top:20px">Close</button>
</div></div>

<div id="m-pin-box" class="modal"><div class="modal-body">
    <h3 style="text-align:center">MANAGER PIN</h3>
    <input type="password" id="pin" style="text-align:center; font-size:1.5rem">
    <button class="btn-term" style="background:#10b981" onclick="auth()">VERIFY</button>
</div></div>

<div id="m-adjust" class="modal"><div class="modal-body">
    <h3 id="adj-title" style="margin-top:0">Fix</h3>
    <div id="box-times" style="display:none"><input type="time" id="adj-in"><input type="time" id="adj-out"></div>
    <div id="box-ot" style="display:none"><input type="number" step="0.01" id="adj-ot" value="0"></div>
    <button class="btn-term" style="background:#10b981; margin-top:15px" onclick="saveAdj()">SUBMIT</button>
</div></div>

<script>
    let isManager = false, activeDay = "", globalSum = {}, dutyHrs = 9;
    let sessionTimer = null;

    // Wrap init in try-catch so JS errors don't block the page
    try {
        document.getElementById('user-date').value = new Date().toLocaleDateString('en-CA');
        document.getElementById('p-month').value = new Date().toISOString().slice(0, 7);
        document.getElementById('f-month').value = new Date().toISOString().slice(0, 7);
    } catch(e) { console.error('Init error:', e); }

    function tick() { try { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' }); } catch(e) {} }
    setInterval(tick, 1000); tick();

    function showToast(m, isError) { 
        const t = document.getElementById("toast"); 
        t.innerText = m; 
        t.classList.remove('error');
        if(isError) t.classList.add('error');
        t.classList.add("show"); 
        setTimeout(() => { t.classList.remove("show"); t.classList.remove('error'); }, 3500); 
    }
    function showLoading(msg) { 
        document.getElementById('loading-overlay').classList.add('show');
        if(msg) document.querySelector('#loading-overlay span').innerText = msg;
    }
    function hideLoading() { 
        document.getElementById('loading-overlay').classList.remove('show');
    }

    // ── Session Timeout ──
    function resetSessionTimer() {
        if (!isManager) return;
        clearTimeout(sessionTimer);
        sessionTimer = setTimeout(() => {
            showToast("Session expired due to inactivity", true);
            logout();
        }, 15 * 60 * 1000);
    }
    // Reset timer on any click while manager
    document.addEventListener('click', () => { if (isManager) resetSessionTimer(); });

    // ── Tab Navigation ──
    function tab(t) {
        document.getElementById('v-att').style.display = t==='att'?'block':'none';
        document.getElementById('v-por').style.display = t==='por'?'block':'none';
        document.getElementById('v-adm').style.display = t==='adm'?'block':'none';
        document.getElementById('n1').className = 'nav-btn' + (t==='att'?' active':'');
        document.getElementById('n2').className = 'nav-btn' + (t==='por'?' active':'');
        document.getElementById('n3').className = 'nav-btn' + (t==='adm'?' active':'');
        if(t==='por') updateStaffDropdowns();
        if(t==='adm' && isManager) { loadAdminData(); refreshAuditLog(); resetSessionTimer(); }
    }

    // ── Confirm Modal (replaces browser confirm()) ──
    let confirmCallback = null;
    function showConfirm(msg, cb) {
        document.getElementById('conf-msg').innerHTML = msg;
        document.getElementById('m-confirm').style.display = 'block';
        confirmCallback = cb;
        document.getElementById('btn-final-confirm').onclick = function() {
            document.getElementById('m-confirm').style.display = 'none';
            if (confirmCallback) confirmCallback();
            confirmCallback = null;
        };
    }
    function closeConfirmModal() {
        document.getElementById('m-confirm').style.display = 'none';
        confirmCallback = null;
    }

    // ── Staff Dropdowns ──
    function updateStaffDropdowns() {
        google.script.run.withFailureHandler(err => {
            showToast('Failed to load staff: ' + err, true);
            const selects = ['user-name', 'p-name', 'f-staff'];
            selects.forEach(sId => {
                const el = document.getElementById(sId);
                if (el) el.innerHTML = '<option value="" disabled selected>--- Error ---</option>';
            });
        }).withSuccessHandler(list => {
            const selects = ['user-name', 'p-name', 'f-staff'];
            selects.forEach(sId => {
                const s = document.getElementById(sId);
                if (!s) return;
                const val = s.value;
                s.innerHTML = (list && list.length > 0) ? '<option value="" disabled selected>--- Select ---</option>' : '<option value="" disabled selected>--- No Staff ---</option>';
                if(list) {
                    list.forEach(name => {
                        const opt = document.createElement('option');
                        opt.value = name;
                        opt.innerText = name;
                        s.appendChild(opt);
                    });
                }
                if(val) s.value = val;
            });
        }).getStaffList();
    }
    // Delay inital load so page renders first, then fetch staff data
    setTimeout(updateStaffDropdowns, 300);

    // ── Admin Panel ──
    function loadAdminData() {
        resetSessionTimer();
        document.getElementById('on-duty-list').innerHTML = '<div style="color:#06b6d4; font-size:0.7rem">Loading...</div>';
        document.getElementById('staff-manage-table').innerHTML = '<div style="color:#06b6d4; font-size:0.7rem">Refreshing...</div>';
        
        google.script.run.withFailureHandler(err => showToast('On-duty error: ' + err, true)).withSuccessHandler(status => {
            let h = '';
            let onDutyCount = 0;
            if (!status || status.length === 0) h = '<div style="opacity:0.6; font-size:0.7rem">No logs found</div>';
            else {
                status.forEach(s => {
                    if (s.status === 'ON DUTY') onDutyCount++;
                    let dot = s.status === 'ON DUTY' ? '🟢' : '⚪';
                    h += `<div style="background:rgba(255,255,255,0.05); padding:12px; border-radius:12px; font-size:0.7rem">
                        <div style="font-weight:800">${dot} ${s.name}</div>
                        <div style="opacity:0.6; margin-top:2px">${s.status} since ${s.since}</div>
                    </div>`;
                });
            }
            document.getElementById('on-duty-list').innerHTML = h;
            document.getElementById('stat-duty').innerText = onDutyCount;
        }).getOnDutyStatus();

        google.script.run.withFailureHandler(err => showToast('Staff list error: ' + err, true)).withSuccessHandler(list => {
            let h = '';
            if (!list || list.length === 0) {
                h = '<div style="opacity:0.6; font-size:0.7rem; padding:20px; text-align:center">No staff registered</div>';
                document.getElementById('stat-staff').innerText = '0';
            } else {
                document.getElementById('stat-staff').innerText = list.length;
                h = '<table style="width:100%; font-size:0.7rem; border-collapse:collapse">';
                list.forEach(s => {
                    const safeName = s[0].replace(/'/g, "\\'");
                    h += `<tr style="border-bottom:1px solid rgba(255,255,255,0.05)">
                        <td style="padding:8px 0"><b>${s[0]}</b><br><small style="opacity:0.5">${s[1]}h · ${s[2]}–${s[3]}</small></td>
                        <td style="text-align:right; white-space:nowrap">
                            <button onclick="editStaff('${safeName}',${s[1]},'${s[2]}','${s[3]}')" class="action-btn-sm" style="background:#06b6d4; padding:4px 10px; margin-right:4px">Edit</button>
                            <button onclick="delStaff('${safeName}')" class="action-btn-sm" style="background:#ef4444; padding:4px 10px">Del</button>
                        </td>
                    </tr>`;
                });
                h += '</table>';
            }
            document.getElementById('staff-manage-table').innerHTML = h;
        }).getStaffFullList();
    }

    // ── Auth ──
    function auth() {
        google.script.run.withFailureHandler(err => showToast("Auth error: " + err, true)).withSuccessHandler(valid => {
            if(valid) { 
                isManager = true; 
                document.getElementById('m-pin-box').style.display='none'; 
                document.getElementById('pin').value=''; 
                document.getElementById('mgr-auth-btn').style.display = 'none';
                document.getElementById('n3').style.display = '';
                showToast("🔐 ADMIN ACCESS GRANTED");
                tab('adm');
                resetSessionTimer();
            } else {
                showToast("Wrong PIN", true);
            }
        }).verifyPin(document.getElementById('pin').value);
    }

    function logout() { 
        isManager = false; 
        clearTimeout(sessionTimer);
        document.getElementById('mgr-auth-btn').style.display = 'block';
        document.getElementById('n3').style.display = 'none';
        if (document.getElementById('v-adm').style.display === 'block') tab('por');
        showToast("LOGGED OUT"); 
    }

    // ── Change Password ──
    function changePassword() {
        const current = document.getElementById('pwd-current').value;
        const newPwd = document.getElementById('pwd-new').value;
        if (!current || !newPwd) return showToast('Enter current and new password', true);
        if (newPwd.length < 4) return showToast('Password must be at least 4 characters', true);
        
        google.script.run.withFailureHandler(err => showToast('Error: ' + err, true)).withSuccessHandler(msg => {
            if (msg.startsWith('SUCCESS')) {
                showToast('✅ Password updated');
                document.getElementById('pwd-current').value = '';
                document.getElementById('pwd-new').value = '';
            } else {
                showToast(msg, true);
            }
        }).setAdminPassword(current, newPwd);
    }

    function openRegModal() { document.getElementById('m-reg').style.display = 'block'; }
    function closeRegModal() { 
        document.getElementById('m-reg').style.display = 'none'; 
        document.getElementById('reg-title').innerText = "STAFF REGISTRATION";
        document.getElementById('edit-old-name').value = "";
        document.getElementById('reg-name').value = "";
        document.getElementById('reg-hrs').value = 9;
        document.getElementById('reg-btn').innerText = "REGISTER";
    }

    function editStaff(n, h, s, e) {
        document.getElementById('reg-title').innerText = "EDIT STAFF: " + n;
        document.getElementById('edit-old-name').value = n;
        document.getElementById('reg-name').value = n;
        document.getElementById('reg-hrs').value = h;
        document.getElementById('reg-start').value = s;
        document.getElementById('reg-end').value = e;
        document.getElementById('reg-btn').innerText = "UPDATE";
        openRegModal();
    }

    function regStaff() {
        const oldN = document.getElementById('edit-old-name').value;
        const n = document.getElementById('reg-name').value, h = document.getElementById('reg-hrs').value;
        const s = document.getElementById('reg-start').value, e = document.getElementById('reg-end').value;
        if(!n || !h) return showToast("Enter Name and Duty Hours", true);
        
        document.getElementById('reg-btn').disabled = true;
        const originalBtnText = document.getElementById('reg-btn').innerText;
        document.getElementById('reg-btn').innerText = "PROCESSING...";

        if (oldN) {
            google.script.run.withFailureHandler(err => {
                showToast("Error: " + err, true);
                document.getElementById('reg-btn').disabled = false;
                document.getElementById('reg-btn').innerText = originalBtnText;
            }).withSuccessHandler(msg => {
                showToast(msg); 
                document.getElementById('reg-btn').disabled = false;
                document.getElementById('reg-btn').innerText = originalBtnText;
                if(msg.startsWith("SUCCESS")) { closeRegModal(); updateStaffDropdowns(); loadAdminData(); }
            }).updateStaff(oldN, n, h, s, e);
        } else {
            google.script.run.withFailureHandler(err => {
                showToast("Error: " + err, true);
                document.getElementById('reg-btn').disabled = false;
                document.getElementById('reg-btn').innerText = originalBtnText;
            }).withSuccessHandler(msg => {
                showToast(msg); 
                document.getElementById('reg-btn').disabled = false;
                document.getElementById('reg-btn').innerText = originalBtnText;
                if(msg.startsWith("SUCCESS")) { document.getElementById('reg-name').value = ''; updateStaffDropdowns(); loadAdminData(); }
            }).registerStaff(n, h, s, e);
        }
    }

    function delStaff(n) {
        showConfirm('Delete staff member <b>' + n + '</b>? This will preserve their attendance history.', function() {
            google.script.run.withFailureHandler(err => showToast('Delete error: ' + err, true)).withSuccessHandler(msg => { 
                showToast(msg); 
                updateStaffDropdowns(); 
                loadAdminData(); 
            }).deleteStaff(n);
        });
    }

    function askPunch(type) {
        const n = document.getElementById('user-name').value, d = document.getElementById('user-date').value;
        if(!n || !d) return showToast("Select Name and Date!", true);
        document.getElementById('conf-msg').innerText = "Register " + type + " for " + n + " on " + d + "?";
        document.getElementById('m-confirm').style.display = 'block';
        document.getElementById('btn-final-confirm').onclick = function() { punch(type); };
    }

    function punch(type) {
        document.getElementById('m-confirm').style.display = 'none';
        const bStart = document.getElementById('btn-start'), bEnd = document.getElementById('btn-end');
        const originalText = (type === 'START SHIFT') ? "Start Shift" : "End Shift";
        const targetBtn = (type === 'START SHIFT') ? bStart : bEnd;
        
        bStart.disabled = true; bEnd.disabled = true;
        targetBtn.innerHTML = '<span class="loader"></span>PROCESSING...';

        google.script.run.withFailureHandler(err => {
            showToast('Punch error: ' + err, true);
            targetBtn.innerText = originalText;
            bStart.disabled = false; bEnd.disabled = false;
        }).withSuccessHandler(m => {
            showToast(m);
            targetBtn.innerText = originalText;
            bStart.disabled = false; bEnd.disabled = false;
        }).processAttendance(document.getElementById('user-name').value, type, document.getElementById('user-date').value);
    }

    function load() {
        const n = document.getElementById('p-name').value, m = document.getElementById('p-month').value;
        if(!n || !m) return;
        
        const dObj = new Date(m + "-01");
        const monthName = dObj.toLocaleString('en-US', { month: 'long', year: 'numeric' });

        showLoading('Loading dashboard...');
        document.getElementById('p-table-body').innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px; color:#06b6d4"><span class="loader"></span>REFRESHING...</td></tr>';
        
        google.script.run.withFailureHandler(err => { showToast('Failed to load duty hours: ' + err, true); hideLoading(); }).withSuccessHandler(hVal => {
            dutyHrs = hVal;
            google.script.run.withFailureHandler(err => { showToast('Failed to load dashboard: ' + err, true); hideLoading(); }).withSuccessHandler(res => {
                globalSum = res.summary;
                document.getElementById('p-stat').style.display = 'block';
                document.getElementById('r-ot').innerText = res.summary.netOt + " h";
                document.getElementById('r-status-lbl').innerText = monthName + " (" + res.summary.status + ")";
                let h = '';
                res.logs.forEach(l => {
                    let sClass = (l.status === 'OT APPROVED') ? 'st-ot' : (l.status === 'OFF DAY' ? 'st-off' : '');
                    let btn = (isManager && (l.status === 'INCOMPLETE' || l.status === 'PENDING FOR APPROVAL')) 
                        ? `<br><button onclick="openAdj('${l.date}','${l.status}')" style="background:#06b6d4; border:none; border-radius:5px; font-size:0.55rem; padding:5px 10px; color:white; cursor:pointer; margin-top:5px; font-weight:800">FIX</button>` : '';
                    
                    let dVal = (l.status !== 'OFF DAY' && l.status !== 'INCOMPLETE') ? ` <b>(${(parseFloat(l.otValue) + dutyHrs).toFixed(1)}h)</b>` : "";
                    
                    h += `<tr><td><b>${l.displayDate}</b></td><td><small style="opacity:0.7">${l.shift}</small>${dVal}</td><td style="text-align:center"><b>${l.otValue}</b></td><td style="text-align:right"><span class="status-pill ${sClass}">${l.status}</span>${btn}</td></tr>`;
                });
                document.getElementById('p-table-body').innerHTML = h;
                hideLoading();
            }).getStaffDashboardData(n, m);
        }).getDutyHours(n);
    }

    function openSum() {
        document.getElementById('s-tot-ot').innerText = globalSum.totalOt + " hrs";
        document.getElementById('s-tot-comp').innerText = globalSum.totalComp + " hrs";
        document.getElementById('s-off').innerText = globalSum.offDays;
        document.getElementById('s-net').innerText = globalSum.netOt + " hrs";
        document.getElementById('s-status').innerText = globalSum.status;
        document.getElementById('m-sum-view').style.display = 'block';
    }
    function openAdj(d, s) { 
        activeDay = d; document.getElementById('m-adjust').style.display='block';
        document.getElementById('box-times').style.display = (s === 'INCOMPLETE') ? 'block' : 'none';
        document.getElementById('box-ot').style.display = (s === 'PENDING FOR APPROVAL') ? 'block' : 'none';
    }
    function saveAdj() {
        google.script.run.withFailureHandler(err => showToast('Fix error: ' + err, true)).withSuccessHandler(msg => { showToast(msg); document.getElementById('m-adjust').style.display='none'; load(); }).managerFixEntry(document.getElementById('p-name').value, activeDay, document.getElementById('adj-in').value, document.getElementById('adj-out').value, document.getElementById('adj-ot').value);
    }
    function saveSettle() {
        const n = document.getElementById('f-staff').value, m = document.getElementById('f-month').value, v = document.getElementById('f-ot').value, s = document.getElementById('f-status').value;
        if(!v || !n) return showToast("Select Staff and Enter OT", true);
        if(!m) return showToast("Select target month", true);
        resetSessionTimer();
        google.script.run.withFailureHandler(err => showToast('Settlement error: ' + err, true)).withSuccessHandler(msg => { 
            showToast(msg); 
            document.getElementById('f-ot').value = '';
        }).saveFinalSettlement(n, m, v, s);
    }

    // ── Export Reports ──
    function downloadCSV(csv, filename) {
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
        URL.revokeObjectURL(link.href);
    }

    function exportCSV() {
        const n = document.getElementById('p-name').value;
        const m = document.getElementById('p-month').value;
        if (!n || !m) return showToast('Select staff and month first', true);
        showLoading('Generating CSV...');
        google.script.run.withFailureHandler(err => { showToast('Export error: ' + err, true); hideLoading(); }).withSuccessHandler(csv => {
            hideLoading();
            if (csv.startsWith('ERROR:')) return showToast(csv, true);
            downloadCSV(csv, n + '_' + m + '_attendance.csv');
            showToast('📥 CSV downloaded');
        }).exportReportCSV(n, m);
    }

    function exportFullCSV() {
        const n = document.getElementById('p-name').value;
        if (!n) return showToast('Select staff first', true);
        showLoading('Generating full history...');
        google.script.run.withFailureHandler(err => { showToast('Export error: ' + err, true); hideLoading(); }).withSuccessHandler(csv => {
            hideLoading();
            if (csv.startsWith('ERROR:')) return showToast(csv, true);
            downloadCSV(csv, n + '_full_history.csv');
            showToast('📥 Full history downloaded');
        }).exportIndividualCSV(n);
    }

    function exportAllCSV() {
        const m = document.getElementById('f-month').value || document.getElementById('p-month').value;
        if (!m) return showToast('Select a month first', true);
        showLoading('Generating all-staff report...');
        google.script.run.withFailureHandler(err => { showToast('Export error: ' + err, true); hideLoading(); }).withSuccessHandler(csv => {
            hideLoading();
            if (csv.startsWith('ERROR:')) return showToast(csv, true);
            downloadCSV(csv, 'ALL_STAFF_' + m + '_attendance.csv');
            showToast('📥 All-staff report downloaded');
        }).exportAllStaffReportCSV(m);
    }

    // ── Audit Log ──
    function refreshAuditLog() {
        if (!isManager) return;
        resetSessionTimer();
        document.getElementById('audit-log-list').innerHTML = '<div style="opacity:0.5; font-size:0.65rem; padding:10px; text-align:center">Loading...</div>';
        google.script.run.withFailureHandler(err => {
            document.getElementById('audit-log-list').innerHTML = '<div style="opacity:0.5; font-size:0.65rem; padding:10px; text-align:center">Failed to load logs</div>';
        }).withSuccessHandler(logs => {
            if (!logs || logs.length === 0) {
                document.getElementById('audit-log-list').innerHTML = '<div style="opacity:0.5; font-size:0.65rem; padding:10px; text-align:center">No audit entries yet</div>';
                return;
            }
            let h = '';
            logs.forEach(l => {
                h += `<div class="audit-entry">
                    <span class="a-time">${l.time}</span>
                    <span class="a-action">${l.action}</span>
                    <span class="a-detail">${l.detail}${l.staff ? ' · ' + l.staff : ''}</span>
                </div>`;
            });
            document.getElementById('audit-log-list').innerHTML = h;
        }).getAuditLogs(50);
    }
</script>
</body>
</html>
